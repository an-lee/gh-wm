version: 1

workflow:
  runs_on:
    - self-hosted
    - linux
  # Optional: prerequisite steps before gh-wm runs (toolchains, deps, engine CLI).
  # When set, `gh wm upgrade` generates an inline run job (not reusable agent-run.yml).
  pre_steps:
    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

engine: claude
model: claude-sonnet-4-20250514
max_turns: 100

context:
  files:
    - CLAUDE.md

pr:
  draft: true
  reviewers: []
