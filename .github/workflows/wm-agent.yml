# AUTO-GENERATED by gh-wm. Do not edit manually.
# Regenerate with: gh wm upgrade
name: WM Agent

on:
  issues:
    types: [labeled, opened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened, review_requested]
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue or PR number (optional)
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  resolve:
    uses: an-lee/gh-wm/.github/workflows/agent-resolve.yml@main
    with:
      event_name: ${{ github.event_name }}
      event_json: ${{ toJSON(github.event) }}
      runs_on: '["self-hosted","linux"]'

  run:
    needs: resolve
    if: ${{ needs.resolve.outputs.tasks != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJSON(needs.resolve.outputs.tasks) }}
    runs-on: ${{ fromJson('["self-hosted","linux"]') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install gh-wm
        run: go install github.com/an-lee/gh-wm@latest
        env:
          GOBIN: ${{ runner.temp }}/bin

      - name: Add gh-wm to PATH
        run: echo "${{ runner.temp }}/bin" >> "$GITHUB_PATH"

      - name: Run task
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_JSON: ${{ toJSON(github.event) }}
          TASK_NAME: ${{ matrix.task }}
        run: |
          printf '%s' "$EVENT_JSON" > event.json
          gh-wm run --repo-root . --task "$TASK_NAME" --event-name "$EVENT_NAME" --payload event.json
