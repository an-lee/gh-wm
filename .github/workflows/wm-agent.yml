name: WM Agent

on:
  issues:
    types: [labeled, opened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened, review_requested]
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue or PR number (optional)
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  resolve:
    uses: an-lee/gh-wm/.github/workflows/agent-resolve.yml@main
    with:
      event_name: ${{ github.event_name }}
      event_json: ${{ toJSON(github.event) }}
      runs_on: '["ubuntu-latest"]'

  run:
    needs: resolve
    if: ${{ needs.resolve.outputs.tasks != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJSON(needs.resolve.outputs.tasks) }}
    uses: an-lee/gh-wm/.github/workflows/agent-run.yml@main
    with:
      task_name: ${{ matrix.task }}
      event_name: ${{ github.event_name }}
      event_json: ${{ toJSON(github.event) }}
      runs_on: '["ubuntu-latest"]'
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
