name: WM Agent

on:
  issues:
    types: [labeled, opened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened, review_requested]
  schedule:
    - cron: "36 10 * * *"
    - cron: "6 10 * * *"
    - cron: "20 11 * * *"
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue or PR number (optional)
        required: false
      task_name:
        description: Run only this task (optional; skips event matching when set)
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  resolve:
    uses: an-lee/gh-wm/.github/workflows/agent-resolve.yml@main
    with:
      event_name: ${{ github.event_name }}
      event_json: ${{ toJSON(github.event) }}
      runs_on: '["self-hosted","linux"]'
      force_task: ${{ github.event.inputs.task_name || '' }}

  run:
    needs: resolve
    if: ${{ needs.resolve.outputs.tasks != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJSON(needs.resolve.outputs.tasks) }}
    uses: an-lee/gh-wm/.github/workflows/agent-run.yml@main
    with:
      task_name: ${{ matrix.task }}
      event_name: ${{ github.event_name }}
      event_json: ${{ toJSON(github.event) }}
      runs_on: '["self-hosted","linux"]'
      install_claude_code: true
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
