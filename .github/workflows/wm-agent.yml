# AUTO-GENERATED by gh-wm. Do not edit manually.
# Regenerate with: gh wm upgrade
name: WM Agent

concurrency:
  group: wm-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

on:
  issues:
    types: [labeled, opened, reopened]
  issue_comment:
    types: [created]
  pull_request:
    types: [review_requested]
  pull_request_review_comment:
    types: [created]
  schedule:
    - cron: "36 10 * * *"
    - cron: "6 10 * * *"
    - cron: "20 11 * * *"
    - cron: "0 22 * * 1-5"
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue or PR number (optional)
        required: false
      task_name:
        description: Run only this task (optional; skips event matching when set)
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  resolve:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]' }}
    uses: an-lee/gh-wm/.github/workflows/agent-resolve.yml@main
    with:
      event_name: ${{ github.event_name }}
      event_json: ${{ toJSON(github.event) }}
      runs_on: '["self-hosted","linux"]'
      force_task: ${{ github.event.inputs.task_name || '' }}
      gh_wm_extension_version: "main"


  run:
    needs: resolve
    if: ${{ needs.resolve.outputs.has_tasks == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJSON(needs.resolve.outputs.tasks) }}
    uses: an-lee/gh-wm/.github/workflows/agent-run.yml@main
    with:
      task_name: ${{ matrix.task }}
      event_name: ${{ github.event_name }}
      event_json: ${{ toJSON(github.event) }}
      resolved_tasks_json: ${{ needs.resolve.outputs.tasks }}
      has_tasks: ${{ needs.resolve.outputs.has_tasks }}
      runs_on: '["self-hosted","linux"]'
      install_claude_code: true
      gh_wm_extension_version: "main"
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

