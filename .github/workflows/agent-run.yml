name: WM Agent Run

on:
  workflow_call:
    inputs:
      task_name:
        required: true
        type: string
      event_name:
        required: true
        type: string
      event_json:
        required: true
        type: string
      runs_on:
        description: JSON array of runner labels for runs-on
        required: false
        type: string
        default: '["ubuntu-latest"]'
      install_claude_code:
        description: Install Claude Code CLI via the official installer before gh wm run (set false for codex-only tasks or when claude is pre-installed on the runner)
        required: false
        type: boolean
        default: true
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  run:
    runs-on: ${{ fromJson(inputs.runs_on) }}
    steps:
      - uses: actions/checkout@v6

      - name: Install gh-wm
        run: gh extension install an-lee/gh-wm --force
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Claude Code
        if: ${{ inputs.install_claude_code }}
        run: curl -fsSL https://claude.ai/install.sh | bash
        env:
          CI: true

      - name: Add Claude Code to PATH
        if: ${{ inputs.install_claude_code }}
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run task
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVENT_NAME: ${{ inputs.event_name }}
          EVENT_JSON: ${{ inputs.event_json }}
          TASK_NAME: ${{ inputs.task_name }}
        run: |
          mkdir -p .wm/runs
          printf '%s' "$EVENT_JSON" > .wm/runs/github-event.json
          gh wm run --repo-root . --task "$TASK_NAME" --event-name "$EVENT_NAME" --payload .wm/runs/github-event.json
