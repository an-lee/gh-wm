name: WM Agent Run

on:
  workflow_call:
    inputs:
      task_name:
        required: true
        type: string
      event_name:
        required: true
        type: string
      event_json:
        required: true
        type: string
      resolved_tasks_json:
        description: JSON array of task names from resolve (prompt expansion)
        required: false
        type: string
        default: ""
      has_tasks:
        description: has_tasks output from resolve job
        required: false
        type: string
        default: ""
      runs_on:
        description: JSON array of runner labels for runs-on
        required: false
        type: string
        default: '["ubuntu-latest"]'
      install_claude_code:
        description: Install Claude Code CLI via the official installer before gh wm run (set false for codex-only tasks or when claude is pre-installed on the runner)
        required: false
        type: boolean
        default: true
      gh_wm_extension_version:
        description: Optional pin for gh extension install (gh extension install --pin); release tag or commit ref
        required: false
        type: string
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  agent:
    permissions:
      contents: read
      issues: read
      pull-requests: read
    runs-on: ${{ fromJson(inputs.runs_on) }}
    steps:
      - uses: actions/checkout@v6

      # GitHub-hosted runners include gh. Self-hosted: composite installs official cli/cli
      # tarball (no Node — avoids broken third-party JS action extraction on some runners).
      - uses: an-lee/gh-wm/.github/actions/install-gh-cli@main

      - name: Install gh-wm
        env:
          GH_TOKEN: ${{ github.token }}
          GH_WM_EXTENSION_VERSION: ${{ inputs.gh_wm_extension_version }}
        run: |
          if [ -n "${GH_WM_EXTENSION_VERSION}" ]; then
            gh extension install an-lee/gh-wm --pin "${GH_WM_EXTENSION_VERSION}" --force
          else
            gh extension install an-lee/gh-wm --force
          fi

      - name: Install Claude Code
        if: ${{ inputs.install_claude_code }}
        run: curl -fsSL https://claude.ai/install.sh | bash
        env:
          CI: true

      - name: Add Claude Code to PATH
        if: ${{ inputs.install_claude_code }}
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run task (agent only; token sandbox)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVENT_NAME: ${{ inputs.event_name }}
          EVENT_JSON: ${{ inputs.event_json }}
          TASK_NAME: ${{ inputs.task_name }}
          WM_RESOLVED_TASKS_JSON: ${{ inputs.resolved_tasks_json }}
          WM_HAS_TASKS: ${{ inputs.has_tasks }}
        run: |
          mkdir -p .wm/runs
          printf '%s' "$EVENT_JSON" > .wm/runs/github-event.json
          gh wm run --repo-root . --task "$TASK_NAME" --event-name "$EVENT_NAME" --payload .wm/runs/github-event.json --agent-only

      - name: Pack workspace for outputs job
        run: tar -czf "${{ runner.temp }}/wm-workspace.tar.gz" -C "$GITHUB_WORKSPACE" .

      - uses: actions/upload-artifact@v5
        with:
          name: wm-workspace-${{ inputs.task_name }}-${{ github.run_id }}
          path: ${{ runner.temp }}/wm-workspace.tar.gz

  outputs:
    needs: agent
    permissions:
      contents: write
      issues: write
      pull-requests: write
    runs-on: ${{ fromJson(inputs.runs_on) }}
    steps:
      - uses: actions/checkout@v6

      - uses: an-lee/gh-wm/.github/actions/install-gh-cli@main

      - name: Install gh-wm
        env:
          GH_TOKEN: ${{ github.token }}
          GH_WM_EXTENSION_VERSION: ${{ inputs.gh_wm_extension_version }}
        run: |
          if [ -n "${GH_WM_EXTENSION_VERSION}" ]; then
            gh extension install an-lee/gh-wm --pin "${GH_WM_EXTENSION_VERSION}" --force
          else
            gh extension install an-lee/gh-wm --force
          fi

      - uses: actions/download-artifact@v7
        with:
          name: wm-workspace-${{ inputs.task_name }}-${{ github.run_id }}
          path: ${{ runner.temp }}

      - name: Extract workspace
        run: tar -xzf "${{ runner.temp }}/wm-workspace.tar.gz" -C "$GITHUB_WORKSPACE"

      - name: Process safe outputs
        env:
          EVENT_NAME: ${{ inputs.event_name }}
          EVENT_JSON: ${{ inputs.event_json }}
          TASK_NAME: ${{ inputs.task_name }}
        run: |
          set -euo pipefail
          gh wm process-outputs --repo-root . --task "$TASK_NAME" --event-name "$EVENT_NAME" --payload .wm/runs/github-event.json
