name: WM Agent Resolve

on:
  workflow_call:
    inputs:
      event_name:
        required: true
        type: string
      event_json:
        required: true
        type: string
      runs_on:
        description: JSON array of runner labels for runs-on
        required: false
        type: string
        default: '["ubuntu-latest"]'
      force_task:
        description: When non-empty, resolve only this task name (skip event matching)
        required: false
        type: string
        default: ""
    outputs:
      tasks:
        description: JSON array of matching task names
        value: ${{ jobs.resolve.outputs.tasks }}
      has_tasks:
        description: Whether at least one task matched (string true or false)
        value: ${{ jobs.resolve.outputs.has_tasks }}

jobs:
  resolve:
    runs-on: ${{ fromJson(inputs.runs_on) }}
    outputs:
      tasks: ${{ steps.match.outputs.tasks }}
      has_tasks: ${{ steps.match.outputs.has_tasks }}
    steps:
      - uses: actions/checkout@v6

      - name: Install gh-wm
        run: gh extension install an-lee/gh-wm --force
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Match tasks
        id: match
        env:
          EVENT_NAME: ${{ inputs.event_name }}
          EVENT_JSON: ${{ inputs.event_json }}
          FORCE_TASK: ${{ inputs.force_task }}
        run: |
          if [ -n "${FORCE_TASK:-}" ]; then
            TASKS=$(gh wm resolve --repo-root . --force-task "$FORCE_TASK" --json)
          else
            mkdir -p .wm/runs
            printf '%s' "$EVENT_JSON" > .wm/runs/github-event.json
            TASKS=$(gh wm resolve --repo-root . --event-name "$EVENT_NAME" --payload .wm/runs/github-event.json --json)
          fi
          TASKS=$(printf '%s' "$TASKS")
          if [ -z "$TASKS" ]; then
            TASKS='[]'
          fi
          {
            echo "tasks<<WM_DELIM"
            echo "$TASKS"
            echo "WM_DELIM"
          } >> "$GITHUB_OUTPUT"
          if command -v jq >/dev/null 2>&1; then
            if printf '%s' "$TASKS" | jq -e 'length > 0' >/dev/null 2>&1; then
              echo "has_tasks=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_tasks=false" >> "$GITHUB_OUTPUT"
            fi
          else
            _c=$(printf '%s' "$TASKS" | tr -d ' \n\r\t')
            if [ "$_c" = "[]" ] || [ -z "$_c" ]; then
              echo "has_tasks=false" >> "$GITHUB_OUTPUT"
            else
              echo "has_tasks=true" >> "$GITHUB_OUTPUT"
            fi
          fi
