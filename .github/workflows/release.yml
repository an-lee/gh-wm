name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ["self-hosted", "linux"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          COMMIT=$(git rev-parse --short HEAD)
          LDFLAGS="-s -w -X github.com/an-lee/gh-wm/cmd.Version=${VERSION} -X github.com/an-lee/gh-wm/cmd.Commit=${COMMIT}"
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/gh-wm-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/gh-wm-linux-arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/gh-wm-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/gh-wm-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/gh-wm-windows-amd64.exe .
          (cd dist && sha256sum gh-wm-* > SHA256SUMS)

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
