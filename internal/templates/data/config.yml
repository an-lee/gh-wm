version: 1

# Optional: gh-aw–style ${{ }} in task markdown bodies (.wm/tasks/*.md).
# compat:
#   gh_aw_expressions: error   # error | warn | off — upgrade/init/validate scan task bodies
#   gh_aw_expand: true        # expand allowed ${{ }} at gh wm run (default true)

workflow:
  runs_on:
    - ubuntu-latest
  # Optional: set false for codex-only or when claude is pre-installed on the runner (default true).
  # install_claude_code: false
  # Optional: gh extension install --pin value (release tag or commit). When unset, latest. See gh help extension install.
  # gh_wm_extension_version: v1.2.3
  # Optional: prerequisite steps before gh-wm runs (toolchains, deps, engine CLI).
  # When set, `gh wm upgrade` generates an inline run job (not reusable agent-run.yml).
  # pre_steps:
  #   - uses: jdx/mise-action@v4
  #     with:
  #       cache: true
  #   - name: Install dependencies
  #     run: bundle install

engine: claude
model: claude-sonnet-4-20250514
max_turns: 100

# Optional: extra repo files appended to the task prompt (paths relative to repo root).
# Do not list CLAUDE.md — Claude Code loads it from the repo automatically; listing it
# here would duplicate it in the prompt.
# context:
#   files:
#     - docs/architecture.md

pr:
  draft: true
  reviewers: []
